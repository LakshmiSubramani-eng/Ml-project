<!DOCTYPE html>
<html>
<head>
    <title>Movie Sentiment Analysis</title>

    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            width: 480px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        h2 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            margin-bottom: 25px;
            color: #666;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 110px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
        }

        textarea:focus {
            border-color: #667eea;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .result {
            margin-top: 25px;
            font-size: 18px;
            font-weight: bold;
        }

        .positive {
            color: #2ecc71;
        }

        .negative {
            color: #e74c3c;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🎬 Movie Sentiment Analysis</h2>
    <p>Enter a movie review to predict sentiment using Machine Learning</p>

    <form action="/predict" method="post">
        <textarea name="review" placeholder="Type your movie review here..." required></textarea>
        <br>
        <button type="submit">Analyze Sentiment</button>
    </form>

    {% if prediction %}
        <div class="result 
        {% if 'Positive' in prediction %}positive{% else %}negative{% endif %}">
            {{ prediction }}
        </div>
    {% endif %}
</div>

</body>
</html>
